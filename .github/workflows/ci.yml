name: CI

on:
  push:
    tags-ignore: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 1G

jobs:
  linux-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build ccache zip \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxinerama-dev \
            libxss-dev libxxf86vm-dev libxkbcommon-dev libwayland-dev wayland-protocols \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libdbus-1-dev libudev-dev libdrm-dev libgbm-dev

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'CMakePresets.json', 'tools/package_release.sh') }}
          restore-keys: |
            ccache-linux-${{ runner.os }}-

      - name: Configure (Linux Release)
        run: cmake --preset linux-release

      - name: Build (Linux Release)
        run: cmake --build --preset linux-release -j"$(nproc)"

      - name: Package (Linux)
        run: bash tools/package_release.sh

      - name: Verify Linux package content
        run: |
          set -euo pipefail
          archive="$(ls dist/bugl-linux-*.tar.gz | head -1)"
          echo "archive=$archive"

          if tar -tzf "$archive" | grep -Eq '\.dll($|[[:space:]])'; then
            echo "error: linux package contains .dll files"
            exit 1
          fi

          if ! tar -tzf "$archive" | grep -Eq 'bugl/bin/plugins/.+\.so(\.|$)'; then
            echo "error: linux package has no .so plugins"
            exit 1
          fi

      - name: ccache stats
        run: ccache -s || true

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: bugl-linux-x86_64
          path: dist/bugl-linux-*.tar.gz
          if-no-files-found: error

  win64-cross-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build ccache zip unzip \
            mingw-w64 g++-mingw-w64-x86-64

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-win64-cross-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'CMakePresets.json', 'mingw-w64.cmake', 'tools/package_release_win64.sh') }}
          restore-keys: |
            ccache-win64-cross-${{ runner.os }}-

      - name: Configure (Win64 Release Cross)
        run: cmake --preset win64-release

      - name: Build (Win64 Release Cross)
        run: cmake --build --preset win64-release -j"$(nproc)"

      - name: Package (Win64)
        run: bash tools/package_release_win64.sh

      - name: Verify Win64 package content
        run: |
          set -euo pipefail
          archive="dist/bugl-win64.zip"
          echo "archive=$archive"

          if unzip -l "$archive" | grep -Eq '\.so($|[[:space:]])'; then
            echo "error: windows package contains .so files"
            exit 1
          fi

          if ! unzip -l "$archive" | grep -Eq 'bugl-win64/bin/plugins/.+\.dll'; then
            echo "error: windows package has no .dll plugins"
            exit 1
          fi

      - name: ccache stats
        run: ccache -s || true

      - name: Upload Win64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: bugl-win64
          path: dist/bugl-win64.zip
          if-no-files-found: error
